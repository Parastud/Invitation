<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>You're Invited</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #tap-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        .play-ring {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .play-triangle {
            width: 0;
            height: 0;
            border-top: 18px solid transparent;
            border-bottom: 18px solid transparent;
            border-left: 30px solid rgba(255, 255, 255, 0.85);
            margin-left: 6px;
        }

        .tap-text {
            color: rgba(255, 255, 255, 0.55);
            font-family: -apple-system, sans-serif;
            font-size: 15px;
            letter-spacing: 0.08em;
        }

        video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            display: none;
        }
    </style>
</head>

<body>

    <div id="tap-screen">
        <div class="play-ring">
            <div class="play-triangle"></div>
        </div>
        <span class="tap-text">tap to open</span>
    </div>

    <video id="vid" src="test.mp4" autoplay
        playsinline controls preload="auto"></video>

    <script>
        const tapScreen = document.getElementById('tap-screen');
        const vid = document.getElementById('vid');

        tapScreen.addEventListener('click', async () => {
            tapScreen.style.display = 'none';
            vid.style.display = 'block';

            // Request fullscreen — must be inside a user gesture (tap/click)
            try {
                if (vid.requestFullscreen) {
                    await vid.requestFullscreen();
                } else if (vid.webkitRequestFullscreen) {
                    await vid.webkitRequestFullscreen(); // Safari desktop
                } else if (vid.webkitEnterFullscreen) {
                    vid.webkitEnterFullscreen(); // iOS Safari
                }
            } catch (e) { }

            try {
                await vid.play();
            } catch (e) { }
        });

        // Keep video visible if user exits fullscreen
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                vid.style.display = 'block';
            }
        });
    </script>

</body>

</html>
