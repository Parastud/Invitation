<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Manoj & Seema — 25th Anniversary</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%; height: 100%;
            background: #0a0705;
            overflow: hidden;
        }

        .layer {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── Particle canvas ── */
        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        /* ── TAP SCREEN ── */
        #tap-screen {
            z-index: 10;
            cursor: pointer;
            background: transparent;
            transition: opacity 0.8s ease;
        }

        .names-line {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(22px, 6vw, 34px);
            color: rgba(200,169,110,0.55);
            letter-spacing: 0.18em;
            text-align: center;
            margin-bottom: 6px;
        }
        .names-heart {
            font-family: Georgia, serif;
            font-style: normal;
            color: #c8a96e;
            margin: 0 10px;
            font-size: 0.85em;
            display: inline-block;
            animation: heartbeat 1.8s ease-in-out infinite;
        }
        @keyframes heartbeat {
            0%,100% { transform: scale(1);    opacity: 0.85; }
            14%     { transform: scale(1.25); opacity: 1;    }
            28%     { transform: scale(1);    opacity: 0.85; }
            42%     { transform: scale(1.15); opacity: 1;    }
            56%     { transform: scale(1);    opacity: 0.85; }
        }

        .badge-number {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(80px, 22vw, 128px);
            color: transparent;
            background: linear-gradient(135deg, #c8a96e 0%, #f5e6c8 45%, #b8872a 75%, #e8d5a0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            line-height: 1;
        }

        .badge-th {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(30px, 8vw, 48px);
            color: #c8a96e;
            vertical-align: super;
        }

        .badge-label {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: clamp(15px, 4vw, 21px);
            color: rgba(200,169,110,0.7);
            letter-spacing: 0.28em;
            text-transform: uppercase;
            margin-top: 6px;
            text-align: center;
        }

        .deco-line {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 20px 0;
        }
        .deco-line::before, .deco-line::after {
            content: '';
            width: 64px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200,169,110,0.5), transparent);
        }
        .deco-diamond {
            width: 5px; height: 5px;
            background: #c8a96e;
            transform: rotate(45deg);
            opacity: 0.65;
        }

        .play-btn {
            position: relative;
            width: 76px; height: 76px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-btn-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(200,169,110,0.35);
            animation: rpulse 3s ease-in-out infinite;
        }
        .play-btn-ring.outer {
            inset: -12px;
            border-color: rgba(200,169,110,0.12);
            animation-delay: 0.7s;
        }
        @keyframes rpulse {
            0%,100% { transform:scale(1); opacity:1; }
            50% { transform:scale(1.07); opacity:0.45; }
        }
        .play-btn-face {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(200,169,110,0.07);
            border: 1px solid rgba(200,169,110,0.28);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-tri {
            width: 0; height: 0;
            border-top: 12px solid transparent;
            border-bottom: 12px solid transparent;
            border-left: 20px solid rgba(200,169,110,0.8);
            margin-left: 5px;
        }

        .tap-hint {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.32em;
            text-transform: uppercase;
            color: rgba(200,169,110,0.3);
            margin-top: 28px;
        }

        /* ── LOADING SCREEN ── */
        #loading-screen {
            z-index: 9;
            display: none;
            opacity: 0;
            background: #0a0705;
            transition: opacity 0.4s ease;
        }

        .load-subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 300;
            font-size: 15px;
            color: rgba(200,169,110,0.45);
            letter-spacing: 0.18em;
            margin-bottom: 44px;
        }

        .ring-wrap {
            position: relative;
            width: 116px; height: 116px;
            margin-bottom: 30px;
        }
        .spin-deco {
            position: absolute;
            border-radius: 50%;
            border: 1px solid transparent;
        }
        .spin-deco.d1 {
            inset: -20px;
            border-top-color: rgba(200,169,110,0.18);
            animation: spin 5s linear infinite;
        }
        .spin-deco.d2 {
            inset: -34px;
            border-right-color: rgba(200,169,110,0.09);
            animation: spin 9s linear infinite reverse;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        .ring-svg {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            transform: rotate(-90deg);
        }
        .ring-track { fill:none; stroke:rgba(200,169,110,0.1); stroke-width:1.5; }
        .ring-arc   { fill:none; stroke:url(#g1); stroke-width:1.5; stroke-linecap:round;
                      stroke-dasharray:339; stroke-dashoffset:339; transition:stroke-dashoffset 0.3s ease; }

        .ring-inner {
            position: absolute;
            inset: 0;
            display: flex; flex-direction:column;
            align-items:center; justify-content:center;
        }
        .ring-num {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 30px;
            color: #c8a96e;
            line-height: 1;
        }
        .ring-unit {
            font-family: 'DM Mono', monospace;
            font-size: 9px;
            color: rgba(200,169,110,0.38);
            letter-spacing: 0.1em;
            margin-top: 1px;
        }

        .load-status {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(200,169,110,0.28);
        }

        /* ── END SCREEN ── */
        #end-screen {
            position: fixed;
            inset: 0;
            z-index: 25;
            background: #0a0705;
            display: none;
            opacity: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .end-names {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(18px, 5vw, 28px);
            color: rgba(200,169,110,0.5);
            letter-spacing: 0.22em;
            margin-bottom: 8px;
            text-align: center;
        }
        .end-heart {
            color: #c8a96e;
            margin: 0 8px;
            display: inline-block;
            animation: heartbeat 1.8s ease-in-out infinite;
        }
        .end-number {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(72px, 20vw, 110px);
            color: transparent;
            background: linear-gradient(135deg, #c8a96e 0%, #f5e6c8 45%, #b8872a 75%, #e8d5a0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            line-height: 1;
        }
        .end-th {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(26px, 7vw, 42px);
            color: #c8a96e;
            vertical-align: super;
        }
        .end-label {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: clamp(14px, 3.5vw, 19px);
            color: rgba(200,169,110,0.65);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-top: 4px;
            text-align: center;
        }
        .end-deco {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 22px 0;
        }
        .end-deco::before, .end-deco::after {
            content: '';
            width: 56px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200,169,110,0.45), transparent);
        }
        .end-diamond {
            width: 5px; height: 5px;
            background: #c8a96e;
            transform: rotate(45deg);
            opacity: 0.6;
        }
        .end-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-style: italic;
            font-size: clamp(13px, 3.5vw, 17px);
            color: rgba(200,169,110,0.38);
            letter-spacing: 0.12em;
            text-align: center;
            margin-top: 4px;
        }
        .replay-btn {
            position: relative;
            width: 68px; height: 68px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-top: 36px;
        }
        .replay-btn-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid rgba(200,169,110,0.35);
            animation: rpulse 3s ease-in-out infinite;
        }
        .replay-btn-ring.outer {
            inset: -11px;
            border-color: rgba(200,169,110,0.12);
            animation-delay: 0.7s;
        }
        .replay-btn-face {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(200,169,110,0.07);
            border: 1px solid rgba(200,169,110,0.28);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Replay icon — circular arrow using SVG */
        .replay-icon {
            width: 24px; height: 24px;
            fill: none;
            stroke: rgba(200,169,110,0.8);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .replay-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(200,169,110,0.3);
            margin-top: 16px;
        }

        /* ── VIDEO ── */
        #vid {
            position: fixed;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: contain;
            background: #000;
            display: none;
            opacity: 0;
            transition: opacity 0.7s ease;
            z-index: 20;
        }
    </style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- 1. Tap screen -->
<div id="tap-screen" class="layer">

    <div class="names-line">Manoj <span class="names-heart">♥</span> Seema</div>

    <div style="display:flex;align-items:flex-start;line-height:1;margin-bottom:4px;margin-top:2px">
        <span class="badge-number">25</span>
        <span class="badge-th">th</span>
    </div>
    <div class="badge-label">Anniversary</div>

    <div class="deco-line"><div class="deco-diamond"></div></div>

    <div class="play-btn">
        <div class="play-btn-ring outer"></div>
        <div class="play-btn-ring"></div>
        <div class="play-btn-face"><div class="play-tri"></div></div>
    </div>

    <div class="tap-hint">Tap to Play</div>
</div>

<!-- 2. Loading screen -->
<div id="loading-screen" class="layer">
    <div class="load-subtitle">Manoj ♥ Seema · 25 Years</div>

    <div class="ring-wrap">
        <div class="spin-deco d1"></div>
        <div class="spin-deco d2"></div>
        <svg class="ring-svg" viewBox="0 0 116 116">
            <defs>
                <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%"   stop-color="#c8a96e"/>
                    <stop offset="50%"  stop-color="#f5e6c8"/>
                    <stop offset="100%" stop-color="#b8872a"/>
                </linearGradient>
            </defs>
            <circle class="ring-track" cx="58" cy="58" r="54"/>
            <circle class="ring-arc"   cx="58" cy="58" r="54" id="ring-arc"/>
        </svg>
        <div class="ring-inner">
            <div class="ring-num" id="pct-num">0</div>
            <div class="ring-unit">%</div>
        </div>
    </div>

    <div class="load-status" id="load-status">loading</div>
</div>

<!-- 3. Video (controls shown for after fullscreen exit) -->
<video id="vid" src="test.mp4" playsinline preload="auto" controls></video>

<!-- 4. End screen -->
<div id="end-screen">
    <canvas id="end-particles" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></canvas>
    <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;">
        <div class="end-names">Manoj <span class="end-heart">♥</span> Seema</div>
        <div style="display:flex;align-items:flex-start;line-height:1;margin-top:6px;">
            <span class="end-number">25</span>
            <span class="end-th">th</span>
        </div>
        <div class="end-label">Anniversary</div>
        <div class="end-deco"><div class="end-diamond"></div></div>
        <div class="end-tagline">25 beautiful years together</div>

        <div class="replay-btn" id="replay-btn">
            <div class="replay-btn-ring outer"></div>
            <div class="replay-btn-ring"></div>
            <div class="replay-btn-face">
                <svg class="replay-icon" viewBox="0 0 24 24">
                    <polyline points="1 4 1 10 7 10"/>
                    <path d="M3.51 15a9 9 0 1 0 .49-4"/>
                </svg>
            </div>
        </div>
        <div class="replay-label">play again</div>
    </div>
</div>

<script>
/* ── Floating gold particles ── */
(function(){
    const c = document.getElementById('particles');
    const ctx = c.getContext('2d');
    let W, H;
    const resize = () => { W = c.width = innerWidth; H = c.height = innerHeight; };
    resize();
    window.addEventListener('resize', resize);

    const pts = Array.from({length:60}, () => ({
        x: Math.random(), y: Math.random(),
        r: Math.random() * 1.6 + 0.3,
        vy: Math.random() * 0.00025 + 0.00008,
        vx: (Math.random()-.5) * 0.00015,
        o: Math.random() * 0.3 + 0.04,
        ph: Math.random() * Math.PI * 2
    }));

    let t = 0;
    (function loop(){
        ctx.clearRect(0,0,W,H);
        t += 0.012;
        pts.forEach(p => {
            p.y -= p.vy;
            p.x += p.vx + Math.sin(t + p.ph) * 0.00025;
            if(p.y < -0.02) p.y = 1.02;
            if(p.x < 0) p.x = 1; if(p.x > 1) p.x = 0;
            const a = p.o * (0.5 + 0.5*Math.sin(t*1.4 + p.ph));
            ctx.beginPath();
            ctx.arc(p.x*W, p.y*H, p.r, 0, Math.PI*2);
            ctx.fillStyle = `rgba(200,169,110,${a})`;
            ctx.fill();
        });
        requestAnimationFrame(loop);
    })();
})();

/* ── Video loader ── */
const tapScreen     = document.getElementById('tap-screen');
const loadingScreen = document.getElementById('loading-screen');
const vid           = document.getElementById('vid');
const ringArc       = document.getElementById('ring-arc');
const pctNum        = document.getElementById('pct-num');
const loadStatus    = document.getElementById('load-status');
const particlesCvs  = document.getElementById('particles');

const CIRCUMFERENCE  = 2 * Math.PI * 54; // ~339.3
const PLAY_THRESHOLD = 1.0;               // wait for 100% buffer
let started = false, pollId = null;

function setProgress(ratio) {
    const pct    = Math.round(ratio * 100);
    const offset = CIRCUMFERENCE * (1 - ratio);
    ringArc.style.strokeDashoffset = offset;
    pctNum.textContent = pct;
}

function getBufferRatio() {
    if (!vid.duration) return 0;
    let end = 0;
    for (let i = 0; i < vid.buffered.length; i++) {
        if (vid.buffered.start(i) <= 1) end = Math.max(end, vid.buffered.end(i));
    }
    return Math.min(end / vid.duration, 1);
}

function goFullscreen() {
    /* iOS Safari needs webkitEnterFullscreen on the <video> element */
    if (vid.webkitEnterFullscreen) {
        try { vid.webkitEnterFullscreen(); } catch(e){}
        return;
    }
    const el = document.documentElement; /* desktop: fullscreen the whole page */
    if (el.requestFullscreen) el.requestFullscreen().catch(()=>{});
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen)    el.mozRequestFullScreen();
}

function showVideo() {
    if (started) return;
    started = true;
    clearInterval(pollId);

    loadStatus.textContent = 'ready';
    setProgress(1);

    setTimeout(() => {
        /* Fade out overlays */
        loadingScreen.style.opacity  = '0';
        particlesCvs.style.transition = 'opacity 0.7s ease';
        particlesCvs.style.opacity   = '0';

        setTimeout(() => {
            loadingScreen.style.display = 'none';

            /* Show video, then play → then fullscreen */
            vid.style.display = 'block';
            requestAnimationFrame(() => requestAnimationFrame(() => {
                vid.style.opacity = '1';
            }));

            vid.play()
               .then(() => { setTimeout(goFullscreen, 120); })
               .catch(()  => { setTimeout(goFullscreen, 120); });

        }, 700);
    }, 450);
}

tapScreen.addEventListener('click', () => {
    tapScreen.style.opacity = '0';
    setTimeout(() => { tapScreen.style.display = 'none'; }, 800);

    loadingScreen.style.display = 'flex';
    requestAnimationFrame(() => { loadingScreen.style.opacity = '1'; });

    vid.load();

    pollId = setInterval(() => {
        const r = getBufferRatio();
        setProgress(r);
        if (r >= PLAY_THRESHOLD && !started) showVideo();
    }, 250);

    vid.addEventListener('progress', () => {
        const r = getBufferRatio();
        setProgress(r);
        if (r >= PLAY_THRESHOLD && !started) showVideo();
    });

    vid.addEventListener('canplaythrough', () => {
        setProgress(1);
        if (!started) showVideo();
    });
});

/* Keep video visible after exiting fullscreen */
['fullscreenchange','webkitfullscreenchange'].forEach(ev => {
    document.addEventListener(ev, () => {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            vid.style.display  = 'block';
            vid.style.opacity  = '1';
        }
    });
});

/* ── End screen ── */
const endScreen = document.getElementById('end-screen');

function showEndScreen() {
    // Exit fullscreen first
    try {
        if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    } catch(e) {}

    vid.style.transition = 'opacity 0.8s ease';
    vid.style.opacity = '0';
    setTimeout(() => { vid.style.display = 'none'; }, 800);

    endScreen.style.display = 'flex';
    requestAnimationFrame(() => requestAnimationFrame(() => {
        endScreen.style.opacity = '1';
    }));

    // Spin up particles on end canvas
    const ec = document.getElementById('end-particles');
    const ectx = ec.getContext('2d');
    ec.width = innerWidth; ec.height = innerHeight;
    window.addEventListener('resize', () => { ec.width = innerWidth; ec.height = innerHeight; });
    let et = 0;
    (function eloop(){
        if (endScreen.style.display === 'none') return;
        ectx.clearRect(0, 0, ec.width, ec.height);
        et += 0.012;
        pts2.forEach(p => {
            p.y -= p.vy; p.x += p.vx + Math.sin(et + p.ph) * 0.00025;
            if(p.y < -0.02) p.y = 1.02;
            if(p.x < 0) p.x = 1; if(p.x > 1) p.x = 0;
            const a = p.o * (0.5 + 0.5*Math.sin(et*1.4 + p.ph));
            ectx.beginPath();
            ectx.arc(p.x*ec.width, p.y*ec.height, p.r, 0, Math.PI*2);
            ectx.fillStyle = `rgba(200,169,110,${a})`;
            ectx.fill();
        });
        requestAnimationFrame(eloop);
    })();
}

const pts2 = Array.from({length:60}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.6 + 0.3,
    vy: Math.random() * 0.00025 + 0.00008,
    vx: (Math.random()-.5) * 0.00015,
    o: Math.random() * 0.3 + 0.04,
    ph: Math.random() * Math.PI * 2
}));

vid.addEventListener('ended', showEndScreen);

/* ── Replay button ── */
document.getElementById('replay-btn').addEventListener('click', () => {
    endScreen.style.opacity = '0';
    setTimeout(() => {
        endScreen.style.display = 'none';
        vid.currentTime = 0;
        vid.style.display = 'block';
        requestAnimationFrame(() => requestAnimationFrame(() => {
            vid.style.opacity = '1';
        }));
        vid.play()
           .then(() => { setTimeout(goFullscreen, 120); })
           .catch(()  => { setTimeout(goFullscreen, 120); });
    }, 600);
});
</script>

</body>
</html>
